version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: castcue-postgres
    environment:
      POSTGRES_USER: castcue
      POSTGRES_PASSWORD: castcue
      POSTGRES_DB: castcue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castcue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

